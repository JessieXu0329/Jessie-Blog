server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jessie_blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  level:
    com.jessieblog: DEBUG

app:
  # 修改为你自己的强密码，前端发布时需要填入
  admin-token: "jessie-blog-secret-2026"
  # GitHub Personal Access Token，用于图片上传（不要提交真实 token）
  github-token: "YOUR_GITHUB_TOKEN_HERE"
