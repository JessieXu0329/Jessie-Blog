server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jessie_blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  level:
    com.jessieblog: DEBUG

app:
  # 优先读环境变量，本地开发用默认值
  admin-token: ${ADMIN_TOKEN:jessie-blog-secret-2026}
  github-token: ${GITHUB_TOKEN:YOUR_GITHUB_TOKEN_HERE}
