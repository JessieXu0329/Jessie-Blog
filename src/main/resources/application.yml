server:
  # Railway 注入 PORT 环境变量，本地默认 8080
  port: ${PORT:8080}

spring:
  datasource:
    # 本地 localhost，Railway 用 MYSQLHOST/MYSQLPORT 等
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:jessie_blog}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  level:
    com.jessieblog: DEBUG

app:
  # 优先读环境变量，本地开发用默认值
  admin-token: ${ADMIN_TOKEN:jessie-blog-secret-2026}
  github-token: ${GITHUB_TOKEN:YOUR_GITHUB_TOKEN_HERE}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
